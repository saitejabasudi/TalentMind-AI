kind = "web"
previewPath = "/"
title = "TalentMind AI"
version = "1.0.0"
id = "artifacts/talentmind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23350

[services.development]
run = "pnpm --filter @workspace/talentmind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/talentmind", "run", "build" ]
publicDir = "artifacts/talentmind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23350"
BASE_PATH = "/"
